name: Integration Tests

on:
  # Run after CI or Release workflow completes
  # - CI on main: catches issues before release (uses 'latest' image)
  # - Release on tags: tests the actual released image (uses tag like 'v0.6.0')
  workflow_run:
    workflows: ["CI", "Release"]
    types:
      - completed
  # Manual trigger for testing specific protocols/tests
  workflow_dispatch:
    inputs:
      protocol:
        description: 'Protocol to test'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - nfs
          - nvmeof
          - iscsi
          - smb
      test:
        description: 'Specific test to run (leave empty for all tests of selected protocol)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - basic
          - snapshot
          - detached-snapshot
          - concurrent
          - persistence
          - statefulset
          - volume-expansion
          - zfsprops
          - name-templating
          - clone-volume
          - delete-strategy-retain
          - block-mode
          - snapshot-stress
          - dual-mount
          - connection-resilience
          - pod-restart
          - access-modes
          - snapshot-restore
          - volume-stress
          - error-handling
          - encryption
      pr:
        description: 'PR number to test (builds image from PR code, leave empty for normal run)'
        required: false
        default: ''
        type: string

# Restrict permissions to minimum required
permissions:
  contents: read

# TrueNAS pool is shared across protocol jobs, so serialize across workflow runs.
# Within a single run, the 5 protocol jobs run in parallel (each in its own VM).
concurrency:
  group: integration-tests
  cancel-in-progress: false

env:
  SSH_OPTS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 -i /tmp/vm-key -p 2222"
  SCP_OPTS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 -i /tmp/vm-key -P 2222"

jobs:
  # ==========================================
  # Setup Phase
  # ==========================================

  # Check if driver files changed (skip integration tests for plugin-only changes)
  check-driver-changes:
    name: Check Driver Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run'
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2
      - name: Check for driver changes
        id: check
        run: |
          # Get changed files in the commit
          CHANGED=$(git diff --name-only HEAD^..HEAD 2>/dev/null || echo "")
          echo "Changed files: $CHANGED"

          # Check if any driver-related files changed (excludes docs/, README, tests/, etc.)
          if echo "$CHANGED" | grep -qE '^(cmd/tns-csi-driver/|pkg/|Dockerfile|go\.(mod|sum)|charts/)'; then
            echo "Driver files changed - will run integration tests"
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "No driver files changed - skipping integration tests"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  compute-tag:
    name: Compute Image Tag
    runs-on: ubuntu-latest
    needs: check-driver-changes
    # Skip if:
    # - triggered by workflow_run and the workflow failed
    # - triggered by CI workflow but not on main branch (only run integration tests for main)
    # - no driver files changed (plugin-only changes)
    # Note: always() allows this job to run even when check-driver-changes is skipped (manual dispatch)
    if: |
      always() &&
      (github.event_name != 'workflow_run' ||
       (github.event.workflow_run.conclusion == 'success' &&
        (github.event.workflow_run.name == 'Release' || github.event.workflow_run.head_branch == 'main'))) &&
      (needs.check-driver-changes.outputs.should_run != 'false')
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      # PR mode: checkout PR code and build image; the protocol jobs will download
      # this artifact and import it into the VM's k3s containerd.
      - name: Checkout PR code
        if: inputs.pr != ''
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ inputs.pr }}/merge

      - name: Set up Docker Buildx
        if: inputs.pr != ''
        uses: docker/setup-buildx-action@v3

      - name: Build PR image
        if: inputs.pr != ''
        run: |
          PR_TAG="pr-${{ inputs.pr }}"
          IMAGE="ghcr.io/fenio/tns-csi:${PR_TAG}"
          echo "=== Building image from PR #${{ inputs.pr }} ==="
          docker buildx build \
            --load \
            --build-arg VERSION="0.0.0-${PR_TAG}" \
            --build-arg GIT_COMMIT="$(git rev-parse --short HEAD)" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "${IMAGE}" .
          docker save "${IMAGE}" -o /tmp/tns-csi-pr-image.tar
          echo "Image saved to /tmp/tns-csi-pr-image.tar"

      - name: Upload PR image artifact
        if: inputs.pr != ''
        uses: actions/upload-artifact@v6
        with:
          name: pr-image
          path: /tmp/tns-csi-pr-image.tar
          retention-days: 1

      - name: Compute image tag from ref
        id: tag
        env:
          # Use environment variables to safely pass workflow_run context
          # This prevents shell injection via malicious branch names
          WORKFLOW_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_EVENT: ${{ github.event.workflow_run.event }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        run: |
          # PR mode: use the PR-specific tag
          if [[ -n "${{ inputs.pr }}" ]]; then
            TAG="pr-${{ inputs.pr }}"
            echo "Using PR image tag: $TAG"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Non-PR runs build the image locally inside each protocol job and tag
          # it as 'e2e-test'. This output is unused for those runs but kept for
          # diagnostic purposes / future use.
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            REF_NAME="$WORKFLOW_HEAD_BRANCH"
            if [ "$WORKFLOW_EVENT" = "push" ] && [[ "$WORKFLOW_HEAD_BRANCH" == v* ]]; then
              REF_TYPE="tag"
            else
              REF_TYPE="branch"
            fi
            echo "Triggered by workflow: $WORKFLOW_NAME"
          else
            REF_NAME="${{ github.ref_name }}"
            REF_TYPE="${{ github.ref_type }}"
          fi

          echo "REF_NAME: $REF_NAME, REF_TYPE: $REF_TYPE"

          if [ "$REF_TYPE" = "tag" ]; then
            TAG="${REF_NAME#v}"
          elif [ "$REF_NAME" = "main" ]; then
            TAG="latest"
          else
            TAG=$(echo "$REF_NAME" | sed 's/\//-/g')
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  # ==========================================
  # E2E Tests (QEMU VM on GitHub-hosted runners)
  # ==========================================
  ginkgo-e2e-nfs:
    name: "E2E: NFS"
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    needs: compute-tag
    if: |
      !cancelled() && needs.compute-tag.result == 'success' &&
      (github.event.inputs.protocol == 'all' || github.event.inputs.protocol == 'nfs' || github.event.inputs.protocol == '')
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.pr != '' && format('refs/pull/{0}/merge', inputs.pr) || '' }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Boot QEMU VM with K3S
        uses: ./.github/actions/qemu-vm
        with:
          truenas_host: ${{ secrets.TRUENAS_HOST_TAILSCALE || secrets.TRUENAS_HOST }}
          tailscale_authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
      - name: Build and import CSI image
        if: inputs.pr == ''
        run: |
          docker build -t ghcr.io/fenio/tns-csi:e2e-test .
          docker save ghcr.io/fenio/tns-csi:e2e-test -o /tmp/csi-image.tar
          scp $SCP_OPTS /tmp/csi-image.tar ci@localhost:/tmp/csi-image.tar
          ssh $SSH_OPTS ci@localhost "sudo k3s ctr images import /tmp/csi-image.tar"
      - name: Download PR image artifact
        if: inputs.pr != ''
        uses: actions/download-artifact@v7
        with:
          name: pr-image
          path: /tmp
      - name: Import PR image into VM
        if: inputs.pr != ''
        run: |
          scp $SCP_OPTS /tmp/tns-csi-pr-image.tar ci@localhost:/tmp/csi-image.tar
          ssh $SSH_OPTS ci@localhost "sudo k3s ctr images import /tmp/csi-image.tar"
      - name: Install Ginkgo
        run: go install github.com/onsi/ginkgo/v2/ginkgo@latest
      - name: Enable NFS allow_nonroot for SLIRP networking
        env:
          TRUENAS_HOST: ${{ secrets.TRUENAS_HOST_TAILSCALE || secrets.TRUENAS_HOST }}
          TRUENAS_API_KEY: ${{ secrets.TRUENAS_API_KEY }}
        run: |
          # QEMU SLIRP user-mode networking remaps source ports through NAT,
          # so NFS clients appear to use non-privileged ports (>1024).
          # TrueNAS defaults to allow_nonroot=false which rejects these.
          # Use WebSocket API only — REST (/api/v2.0/...) is deprecated and removed in 26.04.
          if [ ! -x /tmp/websocat ]; then
            curl -fsSL -o /tmp/websocat https://github.com/vi/websocat/releases/download/v1.13.0/websocat.x86_64-unknown-linux-musl
            chmod +x /tmp/websocat
          fi
          {
            echo "{\"id\":\"1\",\"jsonrpc\":\"2.0\",\"method\":\"auth.login_with_api_key\",\"params\":[\"${TRUENAS_API_KEY}\"]}"
            sleep 5  # let auth complete before sending the next call (TrueNAS processes frames concurrently; 1s wasn't enough)
            echo '{"id":"2","jsonrpc":"2.0","method":"nfs.update","params":[{"allow_nonroot":true}]}'
          } | timeout 30 /tmp/websocat -k "wss://${TRUENAS_HOST}/api/current"
          echo "NFS allow_nonroot enabled"
      - name: Run NFS E2E Tests
        env:
          TRUENAS_HOST: ${{ secrets.TRUENAS_HOST_TAILSCALE || secrets.TRUENAS_HOST }}
          TRUENAS_API_KEY: ${{ secrets.TRUENAS_API_KEY }}
          TRUENAS_POOL: ${{ secrets.TRUENAS_POOL }}
          CSI_IMAGE_REPO: ghcr.io/fenio/tns-csi
          CSI_IMAGE_TAG: ${{ inputs.pr != '' && needs.compute-tag.outputs.image_tag || 'e2e-test' }}
          CSI_IMAGE_PULL_POLICY: Never
          KUBECONFIG: /tmp/kubeconfig
        run: |
          FOCUS=""
          if [ -n "${{ inputs.test }}" ]; then
            FOCUS="--focus=${{ inputs.test }}"
          fi
          ginkgo -v --timeout=110m --flake-attempts=2 $FOCUS ./tests/e2e/nfs/...
      - name: Collect diagnostic logs
        if: always()
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          mkdir -p /tmp/test-logs
          kubectl logs -n kube-system -l app.kubernetes.io/component=controller -c tns-csi-plugin --tail=-1 > /tmp/test-logs/controller.log 2>&1 || true
          kubectl logs -n kube-system -l app.kubernetes.io/component=node -c tns-csi-plugin --tail=-1 > /tmp/test-logs/node.log 2>&1 || true
          kubectl get events --all-namespaces --sort-by='.lastTimestamp' > /tmp/test-logs/events.log 2>&1 || true
          kubectl get pvc --all-namespaces -o wide > /tmp/test-logs/pvcs.log 2>&1 || true
          kubectl get pv -o wide > /tmp/test-logs/pvs.log 2>&1 || true
          kubectl get volumesnapshots --all-namespaces -o wide > /tmp/test-logs/snapshots.log 2>&1 || true
          kubectl get volumesnapshotcontents -o wide > /tmp/test-logs/snapshot-contents.log 2>&1 || true
          ssh $SSH_OPTS ci@localhost "sudo dmesg | tail -100" > /tmp/test-logs/vm-dmesg.log 2>&1 || true
          tail -200 /tmp/vm-console.log > /tmp/test-logs/vm-console.log 2>&1 || true
      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-nfs-diagnostics
          path: /tmp/test-logs/
          retention-days: 7
      - name: Restore NFS allow_nonroot
        if: always()
        env:
          TRUENAS_HOST: ${{ secrets.TRUENAS_HOST_TAILSCALE || secrets.TRUENAS_HOST }}
          TRUENAS_API_KEY: ${{ secrets.TRUENAS_API_KEY }}
        run: |
          if [ ! -x /tmp/websocat ]; then
            curl -fsSL -o /tmp/websocat https://github.com/vi/websocat/releases/download/v1.13.0/websocat.x86_64-unknown-linux-musl
            chmod +x /tmp/websocat
          fi
          {
            echo "{\"id\":\"1\",\"jsonrpc\":\"2.0\",\"method\":\"auth.login_with_api_key\",\"params\":[\"${TRUENAS_API_KEY}\"]}"
            sleep 5  # let auth complete before sending the next call (TrueNAS processes frames concurrently; 1s wasn't enough)
            echo '{"id":"2","jsonrpc":"2.0","method":"nfs.update","params":[{"allow_nonroot":false}]}'
          } | timeout 30 /tmp/websocat -k "wss://${TRUENAS_HOST}/api/current" || echo "WARNING: Failed to restore allow_nonroot"
      - name: Cleanup VM
        if: always()
        run: |
          if [ -f /tmp/vm.pid ]; then
            kill "$(cat /tmp/vm.pid)" 2>/dev/null || true
          fi

  ginkgo-e2e-nvmeof:
