          scp $SCP_OPTS /tmp/csi-image.tar ci@localhost:/tmp/csi-image.tar
          ssh $SSH_OPTS ci@localhost "sudo k3s ctr images import /tmp/csi-image.tar"
      - name: Download PR image artifact
        if: inputs.pr != ''
        uses: actions/download-artifact@v7
        with:
          name: pr-image
          path: /tmp
      - name: Import PR image into VM
        if: inputs.pr != ''
        run: |
          scp $SCP_OPTS /tmp/tns-csi-pr-image.tar ci@localhost:/tmp/csi-image.tar
          ssh $SSH_OPTS ci@localhost "sudo k3s ctr images import /tmp/csi-image.tar"
      - name: Install Ginkgo and smbclient
        run: |
          go install github.com/onsi/ginkgo/v2/ginkgo@latest
          sudo apt-get install -y smbclient 2>/dev/null || true
      - name: Run SMB E2E Tests
        env:
          TRUENAS_HOST: ${{ secrets.TRUENAS_HOST_TAILSCALE || secrets.TRUENAS_HOST }}
          TRUENAS_API_KEY: ${{ secrets.TRUENAS_API_KEY }}
          TRUENAS_POOL: ${{ secrets.TRUENAS_POOL }}
          CSI_IMAGE_REPO: ghcr.io/fenio/tns-csi
          CSI_IMAGE_TAG: ${{ inputs.pr != '' && needs.compute-tag.outputs.image_tag || 'e2e-test' }}
          CSI_IMAGE_PULL_POLICY: Never
          KUBECONFIG: /tmp/kubeconfig
          SMB_USERNAME: ${{ secrets.SMB_USERNAME }}
          SMB_PASSWORD: ${{ secrets.SMB_PASSWORD }}
        run: |
          FOCUS=""
          if [ -n "${{ inputs.test }}" ]; then
            FOCUS="--focus=${{ inputs.test }}"
          fi
          ginkgo -v --timeout=110m --flake-attempts=2 $FOCUS ./tests/e2e/smb/...
      - name: Collect diagnostic logs
        if: always()
        env:
          KUBECONFIG: /tmp/kubeconfig
          TRUENAS_HOST: ${{ secrets.TRUENAS_HOST_TAILSCALE || secrets.TRUENAS_HOST }}
          SMB_USERNAME: ${{ secrets.SMB_USERNAME }}
          SMB_PASSWORD: ${{ secrets.SMB_PASSWORD }}
        run: |
          mkdir -p /tmp/test-logs
          kubectl logs -n kube-system -l app.kubernetes.io/component=controller -c tns-csi-plugin --tail=-1 > /tmp/test-logs/controller.log 2>&1 || true
          kubectl logs -n kube-system -l app.kubernetes.io/component=node -c tns-csi-plugin --tail=-1 > /tmp/test-logs/node.log 2>&1 || true
          kubectl get events --all-namespaces --sort-by='.lastTimestamp' > /tmp/test-logs/events.log 2>&1 || true
          kubectl get pvc --all-namespaces -o wide > /tmp/test-logs/pvcs.log 2>&1 || true
          smbclient -L "//${TRUENAS_HOST}" -U "${SMB_USERNAME}%${SMB_PASSWORD}" --option="client min protocol=SMB3" > /tmp/test-logs/smb-diag.log 2>&1 || true
          ssh $SSH_OPTS ci@localhost "sudo dmesg | tail -100" > /tmp/test-logs/vm-dmesg.log 2>&1 || true
          tail -200 /tmp/vm-console.log > /tmp/test-logs/vm-console.log 2>&1 || true
      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-smb-diagnostics
          path: /tmp/test-logs/
          retention-days: 7
      - name: Cleanup VM
        if: always()
        run: |
          if [ -f /tmp/vm.pid ]; then
            kill "$(cat /tmp/vm.pid)" 2>/dev/null || true
          fi

  ginkgo-e2e-shared:
    name: "E2E: Shared"
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    needs: compute-tag
    if: |
      !cancelled() && needs.compute-tag.result == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.pr != '' && format('refs/pull/{0}/merge', inputs.pr) || '' }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Boot QEMU VM with K3S
        uses: ./.github/actions/qemu-vm
        with:
          truenas_host: ${{ secrets.TRUENAS_HOST_TAILSCALE || secrets.TRUENAS_HOST }}
          tailscale_authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
      - name: Build and import CSI image
        if: inputs.pr == ''
        run: |
          docker build -t ghcr.io/fenio/tns-csi:e2e-test .
          docker save ghcr.io/fenio/tns-csi:e2e-test -o /tmp/csi-image.tar
          scp $SCP_OPTS /tmp/csi-image.tar ci@localhost:/tmp/csi-image.tar
          ssh $SSH_OPTS ci@localhost "sudo k3s ctr images import /tmp/csi-image.tar"
      - name: Download PR image artifact
        if: inputs.pr != ''
        uses: actions/download-artifact@v7
        with:
          name: pr-image
          path: /tmp
      - name: Import PR image into VM
        if: inputs.pr != ''
        run: |
          scp $SCP_OPTS /tmp/tns-csi-pr-image.tar ci@localhost:/tmp/csi-image.tar
          ssh $SSH_OPTS ci@localhost "sudo k3s ctr images import /tmp/csi-image.tar"
      - name: Install Ginkgo
        run: go install github.com/onsi/ginkgo/v2/ginkgo@latest
      - name: Enable NFS allow_nonroot for SLIRP networking
        env:
          TRUENAS_HOST: ${{ secrets.TRUENAS_HOST_TAILSCALE || secrets.TRUENAS_HOST }}
          TRUENAS_API_KEY: ${{ secrets.TRUENAS_API_KEY }}
        run: |
          # Shared tests exercise NFS alongside other protocols, so the SLIRP
          # workaround is needed here too. WebSocket only — REST is deprecated.
          if [ ! -x /tmp/websocat ]; then
            curl -fsSL -o /tmp/websocat https://github.com/vi/websocat/releases/download/v1.13.0/websocat.x86_64-unknown-linux-musl
            chmod +x /tmp/websocat
          fi
          {
            echo "{\"id\":\"1\",\"jsonrpc\":\"2.0\",\"method\":\"auth.login_with_api_key\",\"params\":[\"${TRUENAS_API_KEY}\"]}"
            sleep 5  # let auth complete before sending the next call (TrueNAS processes frames concurrently; 1s wasn't enough)
            echo '{"id":"2","jsonrpc":"2.0","method":"nfs.update","params":[{"allow_nonroot":true}]}'
          } | timeout 30 /tmp/websocat -k "wss://${TRUENAS_HOST}/api/current"
          echo "NFS allow_nonroot enabled"
      - name: Run Shared E2E Tests
        env:
          TRUENAS_HOST: ${{ secrets.TRUENAS_HOST_TAILSCALE || secrets.TRUENAS_HOST }}
          TRUENAS_API_KEY: ${{ secrets.TRUENAS_API_KEY }}
          TRUENAS_POOL: ${{ secrets.TRUENAS_POOL }}
          CSI_IMAGE_REPO: ghcr.io/fenio/tns-csi
          CSI_IMAGE_TAG: ${{ inputs.pr != '' && needs.compute-tag.outputs.image_tag || 'e2e-test' }}
          CSI_IMAGE_PULL_POLICY: Never
          KUBECONFIG: /tmp/kubeconfig
          SMB_USERNAME: ${{ secrets.SMB_USERNAME }}
          SMB_PASSWORD: ${{ secrets.SMB_PASSWORD }}
        run: |
          FOCUS=""
          if [ -n "${{ inputs.test }}" ]; then
            FOCUS="--focus=${{ inputs.test }}"
          fi
          ginkgo -v --timeout=110m --flake-attempts=2 $FOCUS ./tests/e2e/
      - name: Collect diagnostic logs
        if: always()
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          mkdir -p /tmp/test-logs
          kubectl logs -n kube-system -l app.kubernetes.io/component=controller -c tns-csi-plugin --tail=-1 > /tmp/test-logs/controller.log 2>&1 || true
          kubectl logs -n kube-system -l app.kubernetes.io/component=node -c tns-csi-plugin --tail=-1 > /tmp/test-logs/node.log 2>&1 || true
          kubectl get events --all-namespaces --sort-by='.lastTimestamp' > /tmp/test-logs/events.log 2>&1 || true
          kubectl get pvc --all-namespaces -o wide > /tmp/test-logs/pvcs.log 2>&1 || true
          ssh $SSH_OPTS ci@localhost "sudo dmesg | tail -100" > /tmp/test-logs/vm-dmesg.log 2>&1 || true
          tail -200 /tmp/vm-console.log > /tmp/test-logs/vm-console.log 2>&1 || true
          # Same VM-state capture as iSCSI job — Shared exercises iSCSI alongside others
          # so we want to see what's persistently holding /dev/sd* exclusive open.
          ssh $SSH_OPTS ci@localhost 'bash -s' > /tmp/test-logs/vm-state.log 2>&1 <<'REMOTE_EOF' || true
          echo "=== systemctl running services ==="
          systemctl list-units --type=service --state=running --no-pager 2>&1 | head -100
          echo
          echo "=== Loaded kernel modules (storage/dm/multipath) ==="
          lsmod | grep -E 'iscsi|^dm_|multipath|^sd_|crypt' || true
          echo
          echo "=== Installed packages of interest ==="
          dpkg -l 2>/dev/null | grep -E 'multipath|lvm|udisk|psmisc|iscsi|cryptset' || true
          echo
          echo "=== Current /dev/sd* devices ==="
          ls -la /dev/sd* 2>&1 || echo "(none)"
          echo
          echo "=== /sys/block/sd* holders ==="
          for d in /sys/block/sd*; do
            [ -e "$d" ] || continue
            echo "--- $(basename $d) ---"
            ls -la "$d/holders/" 2>&1 || true
          done
          echo
          echo "=== Processes holding /dev/sd* fds ==="
          sudo bash -c '
            for p in /proc/[0-9]*/fd/*; do
              l=$(readlink "$p" 2>/dev/null) || continue
              case "$l" in
                /dev/sd*)
                  pid=$(echo "$p" | cut -d/ -f3)
                  echo "$p -> $l (pid=$pid comm=$(cat /proc/$pid/comm 2>/dev/null))"
                  ;;
              esac
            done
          ' 2>&1 | head -50
          echo
          echo "=== iscsiadm sessions ==="
          sudo iscsiadm -m session 2>&1 | head -20 || true
          echo
          echo "=== udev rules touching sd*/iSCSI ==="
          grep -lE 'KERNEL=="sd|iscsi' /lib/udev/rules.d/ /etc/udev/rules.d/ 2>/dev/null | head
          REMOTE_EOF
      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-shared-diagnostics
          path: /tmp/test-logs/
          retention-days: 7
      - name: Restore NFS allow_nonroot
        if: always()
        env:
          TRUENAS_HOST: ${{ secrets.TRUENAS_HOST_TAILSCALE || secrets.TRUENAS_HOST }}
          TRUENAS_API_KEY: ${{ secrets.TRUENAS_API_KEY }}
        run: |
          if [ ! -x /tmp/websocat ]; then
            curl -fsSL -o /tmp/websocat https://github.com/vi/websocat/releases/download/v1.13.0/websocat.x86_64-unknown-linux-musl
            chmod +x /tmp/websocat
          fi
          {
            echo "{\"id\":\"1\",\"jsonrpc\":\"2.0\",\"method\":\"auth.login_with_api_key\",\"params\":[\"${TRUENAS_API_KEY}\"]}"
            sleep 5  # let auth complete before sending the next call (TrueNAS processes frames concurrently; 1s wasn't enough)
            echo '{"id":"2","jsonrpc":"2.0","method":"nfs.update","params":[{"allow_nonroot":false}]}'
          } | timeout 30 /tmp/websocat -k "wss://${TRUENAS_HOST}/api/current" || echo "WARNING: Failed to restore allow_nonroot"
      - name: Cleanup VM
        if: always()
        run: |
          if [ -f /tmp/vm.pid ]; then
            kill "$(cat /tmp/vm.pid)" 2>/dev/null || true
          fi

  # ==========================================
  # Summary
  # ==========================================
  # Note: All integration tests have been migrated to Ginkgo E2E tests.
  # - Protocol-specific tests: tests/e2e/nfs/, tests/e2e/nvmeof/, tests/e2e/iscsi/, tests/e2e/smb/
  # - Shared tests (all protocols): tests/e2e/*.go (snapshot_restore, stress, name_templating, etc.)

  test-summary:
    name: "Test Summary"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [ginkgo-e2e-nfs, ginkgo-e2e-nvmeof, ginkgo-e2e-iscsi, ginkgo-e2e-smb, ginkgo-e2e-shared]
    if: always()
    steps:
      - name: Generate Test Summary
        uses: actions/github-script@v9
        with:
          script: |
            const e2eResults = {
              'NFS E2E': '${{ needs.ginkgo-e2e-nfs.result }}',
              'NVMe-oF E2E': '${{ needs.ginkgo-e2e-nvmeof.result }}',
              'iSCSI E2E': '${{ needs.ginkgo-e2e-iscsi.result }}',
              'SMB E2E': '${{ needs.ginkgo-e2e-smb.result }}',
              'Shared E2E': '${{ needs.ginkgo-e2e-shared.result }}',
            };

            const getIcon = (result) => {
              switch(result) {
                case 'success': return '✅';
                case 'failure': return '❌';
                case 'skipped': return '⏭️';
                case 'cancelled': return '🚫';
                default: return '⚪';
              }
            };

            let passed = 0, failed = 0, skipped = 0;
            for (const result of Object.values(e2eResults)) {
              if (result === 'success') passed++;
              else if (result === 'failure') failed++;
              else if (result === 'skipped') skipped++;
            }
            const total = Object.keys(e2eResults).length;

            let summary = `# Integration Test Results\n\n`;

            // Overall status banner
            if (failed > 0) {
              summary += `> ### ${failed} test(s) failed\n\n`;
            } else if (passed === total) {
              summary += `> ### All ${total} tests passed!\n\n`;
            } else {
              summary += `> ### ${passed}/${passed + failed} tests passed (${skipped} skipped)\n\n`;
            }

            // Quick stats
            summary += `| Passed | Failed | Skipped | Total |\n`;
            summary += `|:------:|:------:|:-------:|:-----:|\n`;
            summary += `| ${passed} | ${failed} | ${skipped} | ${total} |\n\n`;

            // E2E Tests
            summary += `## E2E Tests\n\n`;
            summary += `| Test Suite | Status |\n`;
            summary += `|------------|:------:|\n`;
            for (const [test, result] of Object.entries(e2eResults)) {
              summary += `| ${test} | ${getIcon(result)} |\n`;
            }
            summary += `\n_Note: Shared E2E includes Snapshot Restore, Volume Stress, and Snapshot Stress tests for NFS, NVMe-oF, iSCSI, and SMB._\n`;

            // Write to job summary
            await core.summary.addRaw(summary).write();

            // Fail if any test failed
            if (failed > 0) {
              core.setFailed(`${failed} test(s) failed`);
            }
