name: CI

on:
  push:
    branches: [ '**' ]  # All branches
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Restrict permissions to minimum required at workflow level
permissions:
  contents: read

jobs:
  # Detect which components changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      driver: ${{ steps.filter.outputs.driver }}
      plugin: ${{ steps.filter.outputs.plugin }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            driver:
              - 'cmd/tns-csi-driver/**'
              - 'pkg/**'
              - 'Dockerfile'
              - 'go.mod'
              - 'go.sum'
              - 'charts/**'
            plugin:
              - 'cmd/kubectl-tns-csi/**'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Pinned to avoid CI churn when upstream bumps default rule strictness.
          # Bump deliberately and fix any new warnings in the same PR.
          version: v2.11.4
          args: --config .golangci.yml

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: make test-unit

      - name: Build
        run: make build

  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: [changes, lint, test]
    # Push on any branch push or manual trigger (not PRs), but only if driver changed
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (needs.changes.outputs.driver == 'true' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract branch name
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            BRANCH=${GITHUB_REF#refs/heads/}
          else
            BRANCH=${{ github.ref_name }}
          fi
          # Sanitize branch name for docker tag (replace / with -)
          TAG=$(echo "$BRANCH" | sed 's/\//-/g')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "is_main=$([[ "$BRANCH" == 'main' ]] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      - name: Get version info
        id: version
        run: |
          # For branch builds, use 0.0.0-<branch> format (valid semver prerelease)
          BRANCH_TAG=${{ steps.branch.outputs.tag }}
          VERSION="0.0.0-${BRANCH_TAG}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Build and push images
        uses: docker/build-push-action@v7
        with:
          context: .
          # Only build amd64 for faster CI (ARM64 builds via QEMU take 10+ minutes)
          # Multi-arch builds happen in release workflow for tagged versions
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.commit }}
            BUILD_DATE=${{ steps.version.outputs.date }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tns-csi:${{ steps.branch.outputs.tag }}
            ghcr.io/${{ github.repository }}:${{ steps.branch.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push latest tag (main branch only)
        if: steps.branch.outputs.is_main == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.commit }}
            BUILD_DATE=${{ steps.version.outputs.date }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tns-csi:latest
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-image-pr:
    name: Build Docker Image (PR)
    runs-on: ubuntu-latest
    needs: [changes, lint, test]
    # Only build (not push) on PRs, and only if driver changed
    if: github.event_name == 'pull_request' && needs.changes.outputs.driver == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        run: make docker-build

  build-plugin:
    name: Build Plugin
    runs-on: ubuntu-latest
    needs: [changes, lint, test]
    # Build plugin if plugin files changed
    if: needs.changes.outputs.plugin == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build plugin
        run: make build-plugin

      - name: Test plugin builds for multiple platforms
        run: |
          # Quick sanity check that cross-compilation works
          GOOS=linux GOARCH=arm64 go build -o /dev/null ./cmd/kubectl-tns-csi
          GOOS=darwin GOARCH=amd64 go build -o /dev/null ./cmd/kubectl-tns-csi
          GOOS=darwin GOARCH=arm64 go build -o /dev/null ./cmd/kubectl-tns-csi
          GOOS=windows GOARCH=amd64 go build -o /dev/null ./cmd/kubectl-tns-csi
